<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bloco – Item com Tamanhos + Adicionais</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="global.css">
</head>
<body class="bg-[#F4F4F4] min-h-screen flex items-center justify-center p-4 md:p-8">

  <section name="bloco-item-tamanhos-adicionais" data-max-adicionais="4" class="bg-white border border-[#EBEBEB] w-full max-w-4xl rounded-2xl overflow-hidden shadow-sm">

    <!-- IMAGEM DO TOPO -->
    <div name="imagem-topo" class="relative w-full h-56 md:h-72 overflow-hidden bg-[#E8E8E8]">
      <img name="imagem-topo-src" src="https://placehold.co/800x500/DDDDDD/999999?text=Foto+do+Item" alt="Foto do item" class="w-full h-full object-cover" />
    </div>

    <div class="p-6 md:p-8 space-y-6">

      <!-- NOME -->
      <div name="cabecalho-item">
        <h1 name="item-nome" class="text-xl font-semibold text-neutral-800 leading-snug">Açaí da Casa</h1>
        <p name="item-subtitulo" class="text-sm text-neutral-400 mt-0.5">Escolha o tamanho e monte do seu jeito</p>
      </div>

      <!-- DESCRIÇÃO -->
      <div name="item-descricao" class="text-sm text-neutral-600 leading-relaxed">
        <p name="item-descricao-paragrafo-1">Açaí puro batido na hora, sem conservantes. Escolha o tamanho e adicione os complementos que quiser. Este campo aceita <strong class="font-medium text-neutral-700">HTML rico</strong>.</p>
      </div>

      <hr class="border-neutral-100" />

      <!-- TAMANHOS -->
      <div name="secao-tamanhos" class="space-y-3">
        <p class="text-[10px] uppercase tracking-widest text-neutral-400 font-medium">Tamanho</p>

        <div name="grade-tamanhos" class="grid grid-cols-2 md:grid-cols-4 gap-2">

          <button name="tamanho-300ml" onclick="selecionarTamanho(this, 14.90, '300ml')"
            class="tamanho-card cursor-pointer rounded-xl p-3 text-center space-y-1">
            <p name="tamanho-300ml-volume" class="text-lg font-semibold text-neutral-700">300ml</p>
            <p name="tamanho-300ml-desc" class="text-xs text-neutral-400">Individual</p>
            <p name="tamanho-300ml-preco" class="text-sm font-semibold text-neutral-800">R$ 14,90</p>
          </button>

          <button name="tamanho-500ml" onclick="selecionarTamanho(this, 22.90, '500ml')"
            class="tamanho-card selecionado cursor-pointer rounded-xl p-3 text-center space-y-1">
            <p name="tamanho-500ml-volume" class="text-lg font-semibold text-neutral-700">500ml</p>
            <p name="tamanho-500ml-desc" class="text-xs text-neutral-400">Médio</p>
            <p name="tamanho-500ml-preco" class="text-sm font-semibold text-neutral-800">R$ 22,90</p>
          </button>

          <button name="tamanho-700ml" onclick="selecionarTamanho(this, 28.90, '700ml')"
            class="tamanho-card cursor-pointer rounded-xl p-3 text-center space-y-1">
            <p name="tamanho-700ml-volume" class="text-lg font-semibold text-neutral-700">700ml</p>
            <p name="tamanho-700ml-desc" class="text-xs text-neutral-400">Grande</p>
            <p name="tamanho-700ml-preco" class="text-sm font-semibold text-neutral-800">R$ 28,90</p>
          </button>

          <button name="tamanho-1l" onclick="selecionarTamanho(this, 36.90, '1L')"
            class="tamanho-card cursor-pointer rounded-xl p-3 text-center space-y-1">
            <p name="tamanho-1l-volume" class="text-lg font-semibold text-neutral-700">1L</p>
            <p name="tamanho-1l-desc" class="text-xs text-neutral-400">Família</p>
            <p name="tamanho-1l-preco" class="text-sm font-semibold text-neutral-800">R$ 36,90</p>
          </button>

        </div>
      </div>

      <hr class="border-neutral-100" />

      <!-- ADICIONAIS -->
      <div name="secao-adicionais" class="space-y-3">
        <div class="flex items-center justify-between">
          <p class="text-[10px] uppercase tracking-widest text-neutral-400 font-medium">Adicionais</p>
          <p id="contadorAdicionais" class="text-xs text-neutral-400">0 de 4 selecionados</p>
        </div>

        <div name="lista-adicionais" class="space-y-2">

          <label name="adicional-granola" for="add-granola" class="adicional-item cursor-pointer flex items-center gap-3 rounded-xl px-4 py-3">
            <input name="adicional-granola-check" id="add-granola" type="checkbox" class="custom-check" data-preco="2" onchange="atualizarAdicionais(this)" />
            <div class="flex-1 min-w-0">
              <p name="adicional-granola-nome" class="text-sm font-medium text-neutral-800">Granola</p>
              <p name="adicional-granola-detalhe" class="text-xs text-neutral-400">Granola crocante artesanal</p>
            </div>
            <p name="adicional-granola-preco" class="text-sm font-semibold text-neutral-600 shrink-0">+ R$ 2,00</p>
          </label>

          <label name="adicional-banana" for="add-banana" class="adicional-item cursor-pointer flex items-center gap-3 rounded-xl px-4 py-3">
            <input name="adicional-banana-check" id="add-banana" type="checkbox" class="custom-check" data-preco="2" onchange="atualizarAdicionais(this)" />
            <div class="flex-1 min-w-0">
              <p name="adicional-banana-nome" class="text-sm font-medium text-neutral-800">Banana</p>
              <p name="adicional-banana-detalhe" class="text-xs text-neutral-400">Banana fatiada fresca</p>
            </div>
            <p name="adicional-banana-preco" class="text-sm font-semibold text-neutral-600 shrink-0">+ R$ 2,00</p>
          </label>

          <label name="adicional-morango" for="add-morango" class="adicional-item cursor-pointer flex items-center gap-3 rounded-xl px-4 py-3">
            <input name="adicional-morango-check" id="add-morango" type="checkbox" class="custom-check" data-preco="3" onchange="atualizarAdicionais(this)" />
            <div class="flex-1 min-w-0">
              <p name="adicional-morango-nome" class="text-sm font-medium text-neutral-800">Morango</p>
              <p name="adicional-morango-detalhe" class="text-xs text-neutral-400">Morangos frescos fatiados</p>
            </div>
            <p name="adicional-morango-preco" class="text-sm font-semibold text-neutral-600 shrink-0">+ R$ 3,00</p>
          </label>

          <label name="adicional-mel" for="add-mel" class="adicional-item cursor-pointer flex items-center gap-3 rounded-xl px-4 py-3">
            <input name="adicional-mel-check" id="add-mel" type="checkbox" class="custom-check" data-preco="2" onchange="atualizarAdicionais(this)" />
            <div class="flex-1 min-w-0">
              <p name="adicional-mel-nome" class="text-sm font-medium text-neutral-800">Mel</p>
              <p name="adicional-mel-detalhe" class="text-xs text-neutral-400">Mel silvestre puro</p>
            </div>
            <p name="adicional-mel-preco" class="text-sm font-semibold text-neutral-600 shrink-0">+ R$ 2,00</p>
          </label>

          <label name="adicional-leite-condensado" for="add-leite" class="adicional-item cursor-pointer flex items-center gap-3 rounded-xl px-4 py-3">
            <input name="adicional-leite-condensado-check" id="add-leite" type="checkbox" class="custom-check" data-preco="2" onchange="atualizarAdicionais(this)" />
            <div class="flex-1 min-w-0">
              <p name="adicional-leite-condensado-nome" class="text-sm font-medium text-neutral-800">Leite Condensado</p>
              <p name="adicional-leite-condensado-detalhe" class="text-xs text-neutral-400">Fio de leite condensado</p>
            </div>
            <p name="adicional-leite-condensado-preco" class="text-sm font-semibold text-neutral-600 shrink-0">+ R$ 2,00</p>
          </label>

          <label name="adicional-nutella" for="add-nutella" class="adicional-item cursor-pointer flex items-center gap-3 rounded-xl px-4 py-3">
            <input name="adicional-nutella-check" id="add-nutella" type="checkbox" class="custom-check" data-preco="5" onchange="atualizarAdicionais(this)" />
            <div class="flex-1 min-w-0">
              <p name="adicional-nutella-nome" class="text-sm font-medium text-neutral-800">Nutella</p>
              <p name="adicional-nutella-detalhe" class="text-xs text-neutral-400">Creme de avelã Nutella</p>
            </div>
            <p name="adicional-nutella-preco" class="text-sm font-semibold text-neutral-600 shrink-0">+ R$ 5,00</p>
          </label>

        </div>
      </div>

      <hr class="border-neutral-100" />

      <!-- QUANTIDADE -->
      <div name="secao-quantidade" class="space-y-3">
        <p class="text-[10px] uppercase tracking-widest text-neutral-400 font-medium">Quantidade</p>
        <div class="flex items-center gap-2 flex-wrap">
          <div class="flex gap-1.5">
            <button onclick="selecionarPreset(this, 1)" class="qty-preset ativo cursor-pointer w-9 h-9 rounded-xl text-sm font-medium text-neutral-700">1</button>
            <button onclick="selecionarPreset(this, 2)" class="qty-preset cursor-pointer w-9 h-9 rounded-xl text-sm font-medium text-neutral-700">2</button>
            <button onclick="selecionarPreset(this, 3)" class="qty-preset cursor-pointer w-9 h-9 rounded-xl text-sm font-medium text-neutral-700">3</button>
            <button onclick="selecionarPreset(this, 4)" class="qty-preset cursor-pointer w-9 h-9 rounded-xl text-sm font-medium text-neutral-700">4</button>
            <button onclick="selecionarPreset(this, 5)" class="qty-preset cursor-pointer w-9 h-9 rounded-xl text-sm font-medium text-neutral-700">5</button>
          </div>
          <span class="text-neutral-200 text-sm select-none">|</span>
          <div class="flex items-center gap-1.5">
            <button onclick="ajustar(-1)" class="qty-btn cursor-pointer w-9 h-9 rounded-xl text-neutral-600 text-lg font-light flex items-center justify-center">−</button>
            <input name="quantidade-valor" id="quantidadeValor" type="number" min="1" value="1" oninput="atualizarPorInput(this)"
              class="w-12 h-9 text-center text-sm font-medium text-neutral-800 border border-[#E8E8E8] rounded-xl focus:outline-none focus:border-neutral-400 bg-white" />
            <button onclick="ajustar(1)" class="qty-btn cursor-pointer w-9 h-9 rounded-xl text-neutral-600 text-lg font-light flex items-center justify-center">+</button>
          </div>
        </div>
      </div>

      <hr class="border-neutral-100" />

      <!-- OBSERVAÇÕES -->
      <div name="secao-observacoes" class="space-y-2">
        <label class="block text-[10px] uppercase tracking-widest text-neutral-400 font-medium">Observações</label>
        <textarea name="observacoes-input" rows="2" placeholder="Ex: menos doce, sem granola por cima..." class="obs-input w-full rounded-xl px-4 py-2.5 text-sm text-neutral-700 placeholder-neutral-300 bg-white"></textarea>
      </div>

      <hr class="border-neutral-100" />

      <!-- PREÇO FINAL -->
      <div name="secao-preco-final" class="flex items-center justify-between">
        <div>
          <p class="text-[10px] uppercase tracking-widest text-neutral-400 font-medium">Total</p>
          <p name="item-preco-final" id="precoFinal" class="text-2xl font-semibold text-neutral-800 mt-0.5">R$ 22,90</p>
        </div>
        <p id="precoDetalhe" class="text-xs text-neutral-400 text-right"></p>
      </div>

      <button name="botao-carrinho" type="button" onclick="adicionarCarrinho()"
        class="cursor-pointer w-full bg-neutral-800 hover:bg-neutral-700 text-white text-sm font-semibold px-6 py-3.5 rounded-xl transition-colors flex items-center justify-center gap-2">
        <span>🛒</span>
        <span>Adicionar ao carrinho</span>
        <span id="botaoPreco" class="opacity-60 font-normal">· R$ 22,90</span>
      </button>

    </div>
  </section>

  <script>
    let precoTamanho = 22.90;
    let tamanhoAtual = '500ml';
    let totalAdicionais = 0;
    let quantidade = 1;

    function fmt(v) { return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }
    function calcUnit() { return precoTamanho + totalAdicionais; }

    function selecionarTamanho(btn, preco, label) {
      document.querySelectorAll('.tamanho-card').forEach(c => c.classList.remove('selecionado'));
      btn.classList.add('selecionado');
      precoTamanho = preco;
      tamanhoAtual = label;
      atualizarPreco();
    }

    const maxAdicionais = parseInt(document.querySelector('[name="bloco-item-tamanhos-adicionais"]').getAttribute('data-max-adicionais')) || Infinity;

    function atualizarAdicionais(check) {
      const selecionados = [...document.querySelectorAll('.custom-check:checked')];

      if (check.checked && selecionados.length > maxAdicionais) {
        check.checked = false;
        return;
      }

      check.closest('label').classList.toggle('selecionado', check.checked);

      const total = [...document.querySelectorAll('.custom-check:checked')].length;

      document.querySelectorAll('.custom-check').forEach(c => {
        const label = c.closest('label');
        if (!c.checked && total >= maxAdicionais) {
          c.disabled = true;
          label.classList.add('opacity-40', 'cursor-not-allowed');
          label.classList.remove('cursor-pointer');
        } else {
          c.disabled = false;
          label.classList.remove('opacity-40', 'cursor-not-allowed');
          label.classList.add('cursor-pointer');
        }
      });

      document.getElementById('contadorAdicionais').textContent =
        `${total} de ${maxAdicionais === Infinity ? '∞' : maxAdicionais} selecionados`;

      totalAdicionais = [...document.querySelectorAll('.custom-check:checked')]
        .reduce((a, c) => a + parseFloat(c.getAttribute('data-preco')), 0);
      atualizarPreco();
    }

    function atualizarPreco() {
      const unit = calcUnit();
      const total = unit * quantidade;
      document.getElementById('precoFinal').textContent = fmt(total);
      document.getElementById('precoDetalhe').textContent = quantidade > 1 ? `${quantidade} × ${fmt(unit)}` : '';
      document.getElementById('botaoPreco').textContent = `· ${fmt(total)}`;
    }

    function selecionarPreset(btn, val) {
      quantidade = val;
      document.querySelectorAll('.qty-preset').forEach(b => b.classList.toggle('ativo', parseInt(b.textContent) === val));
      document.getElementById('quantidadeValor').value = val;
      atualizarPreco();
    }

    function ajustar(delta) {
      quantidade = Math.max(1, quantidade + delta);
      document.getElementById('quantidadeValor').value = quantidade;
      document.querySelectorAll('.qty-preset').forEach(b => b.classList.toggle('ativo', parseInt(b.textContent) === quantidade));
      atualizarPreco();
    }

    function atualizarPorInput(input) {
      const val = parseInt(input.value);
      if (!isNaN(val) && val >= 1) { quantidade = val; atualizarPreco(); }
    }

    function adicionarCarrinho() {
      alert(`✓ Adicionado!\n${tamanhoAtual} × ${quantidade}\nTotal: ${fmt(calcUnit() * quantidade)}`);
    }
  </script>

</body>
</html>
